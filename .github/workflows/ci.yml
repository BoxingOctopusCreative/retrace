name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Frontend tests
        run: npm test

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Download uv sidecar
        run: |
          TRIPLE=$(rustc -vV | grep host | awk '{print $2}')
          curl -fsSL "https://github.com/astral-sh/uv/releases/latest/download/uv-${TRIPLE}.tar.gz" \
            | tar -xz -C /tmp
          cp "/tmp/uv-${TRIPLE}/uv" "src-tauri/binaries/uv-${TRIPLE}"
          chmod +x "src-tauri/binaries/uv-${TRIPLE}"

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

  release:
    name: Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Download uv sidecar (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          TRIPLE=$(rustc -vV | grep host | awk '{print $2}')
          curl -fsSL "https://github.com/astral-sh/uv/releases/latest/download/uv-${TRIPLE}.tar.gz" \
            | tar -xz -C /tmp
          cp "/tmp/uv-${TRIPLE}/uv" "src-tauri/binaries/uv-${TRIPLE}"
          chmod +x "src-tauri/binaries/uv-${TRIPLE}"

      - name: Download uv sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $triple = (rustc -vV | Select-String 'host').ToString().Split()[1]
          $tmp = "$env:TEMP\uv"
          Invoke-WebRequest -Uri "https://github.com/astral-sh/uv/releases/latest/download/uv-${triple}.zip" -OutFile "$tmp.zip"
          Expand-Archive -Path "$tmp.zip" -DestinationPath $tmp
          Copy-Item "$tmp\uv-${triple}\uv.exe" "src-tauri\binaries\uv-${triple}.exe"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Re:Trace ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
