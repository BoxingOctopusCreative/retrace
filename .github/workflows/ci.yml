name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Frontend tests
        run: npm test

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Download uv sidecar
        run: |
          TRIPLE=$(rustc -vV | grep host | awk '{print $2}')
          curl -fsSL "https://github.com/astral-sh/uv/releases/latest/download/uv-${TRIPLE}.tar.gz" \
            | tar -xz -C /tmp
          cp "/tmp/uv-${TRIPLE}/uv" "src-tauri/binaries/uv-${TRIPLE}"
          chmod +x "src-tauri/binaries/uv-${TRIPLE}"

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

  create-release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${TAG}"
          else
            RANGE="${TAG}"
          fi

          {
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --pretty=format:"- %s" --no-merges
            echo ""
            if [ -n "$PREV" ]; then
              echo "**Full diff:** [\`${PREV}..${TAG}\`](../../compare/${PREV}...${TAG})"
            fi
          } > notes.md

      - uses: actions/github-script@v7
        id: create-release
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');
            const body = fs.readFileSync('notes.md', 'utf8');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Re:Trace ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: Build (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Download uv sidecar (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          TRIPLE=$(rustc -vV | grep host | awk '{print $2}')
          curl -fsSL "https://github.com/astral-sh/uv/releases/latest/download/uv-${TRIPLE}.tar.gz" \
            | tar -xz -C /tmp
          cp "/tmp/uv-${TRIPLE}/uv" "src-tauri/binaries/uv-${TRIPLE}"
          chmod +x "src-tauri/binaries/uv-${TRIPLE}"

      - name: Download uv sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $triple = (rustc -vV | Select-String 'host').ToString().Split()[1]
          $extractDir = "$env:TEMP\uv-$triple"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Invoke-WebRequest -Uri "https://github.com/astral-sh/uv/releases/latest/download/uv-${triple}.zip" -OutFile "$extractDir.zip"
          Expand-Archive -Path "$extractDir.zip" -DestinationPath $extractDir -Force
          # The zip extracts to a subdirectory named after the triple; find uv.exe recursively
          $uvExe = (Get-ChildItem -Path $extractDir -Filter "uv.exe" -Recurse | Select-Object -First 1).FullName
          if (-not $uvExe) { Write-Error "uv.exe not found after extraction"; exit 1 }
          Copy-Item $uvExe "src-tauri\binaries\uv-${triple}.exe"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

      # tauri-action's signing step is unreliable for the .app.tar.gz; sign it
      # ourselves via the Tauri CLI, then upload all platform updater artefacts
      # so publish-release can assemble latest.json from them.
      - name: Sign and upload updater bundle (macOS)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ARCH=$(rustc -vV | grep host | awk '{print $2}' | cut -d- -f1)
          TAG="${{ github.ref_name }}"
          BUNDLE=$(find src-tauri/target/release/bundle/macos -name "*.app.tar.gz" | head -1)
          if [ -z "$BUNDLE" ]; then echo "No .app.tar.gz bundle found"; exit 1; fi

          # Sign using the Tauri CLI (bypasses tauri-action's signing which fails silently).
          # tauri signer sign outputs the minisign signature to stdout; redirect to .sig file.
          ./node_modules/.bin/tauri signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            "$BUNDLE" > "${BUNDLE}.sig"

          if [ ! -s "${BUNDLE}.sig" ]; then echo "Signing failed — .sig file is empty"; exit 1; fi
          cp "${BUNDLE}.sig" "/tmp/retrace_${ARCH}.app.tar.gz.sig"
          gh release upload "$TAG" "/tmp/retrace_${ARCH}.app.tar.gz.sig" --clobber

      - name: Upload updater bundles + sigs (Linux)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Linux'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for f in $(find src-tauri/target/release/bundle/appimage -name "*.AppImage.tar.gz*" 2>/dev/null); do
            gh release upload "$TAG" "$f" --clobber
          done

      - name: Upload updater bundles + sigs (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $dir = "src-tauri\target\release\bundle\nsis"
          # Use separate patterns — the wildcard *.nsis.zip* is unreliable in pwsh -Filter
          foreach ($pattern in @("*.nsis.zip", "*.nsis.zip.sig")) {
            $file = Get-ChildItem $dir -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($file) { gh release upload $tag $file.FullName --clobber }
          }

  publish-release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');

            // getReleaseByTag returns 404 for draft releases; use the ID
            // passed directly from create-release instead.
            const releaseId = parseInt('${{ needs.create-release.outputs.release_id }}');
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            const assets = release.assets;
            const find = (re) => assets.find(a => re.test(a.name));
            const fetchText = async (url) => {
              const r = await fetch(url, {
                headers: { Authorization: `Bearer ${process.env.GITHUB_TOKEN}` },
              });
              return r.text();
            };

            const matchers = {
              'darwin-aarch64': {
                bundle: /aarch64.*\.app\.tar\.gz(?!\.sig)$/,
                sig:    /aarch64.*\.app\.tar\.gz\.sig$/,
              },
              'darwin-x86_64': {
                bundle: /x86_64.*\.app\.tar\.gz(?!\.sig)$/,
                sig:    /x86_64.*\.app\.tar\.gz\.sig$/,
              },
              'linux-x86_64': {
                bundle: /\.AppImage\.tar\.gz(?!\.sig)$/,
                sig:    /\.AppImage\.tar\.gz\.sig$/,
              },
              'windows-x86_64': {
                bundle: /x64-setup\.nsis\.zip(?!\.sig)$/,
                sig:    /x64-setup\.nsis\.zip\.sig$/,
              },
            };

            const platforms = {};
            for (const [key, { bundle, sig }] of Object.entries(matchers)) {
              const bundleAsset = find(bundle);
              const sigAsset = find(sig);
              if (bundleAsset && sigAsset) {
                platforms[key] = {
                  url: bundleAsset.browser_download_url,
                  signature: (await fetchText(sigAsset.browser_download_url)).trim(),
                };
              }
            }

            const latestJson = JSON.stringify({
              version,
              notes: release.body || '',
              pub_date: release.created_at,
              platforms,
            }, null, 2);

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'latest.json',
              data: latestJson,
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
